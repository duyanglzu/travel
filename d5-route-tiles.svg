<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" width="900" height="750">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4f8"/>
      <stop offset="100%" stop-color="#d4edf0"/>
    </linearGradient>
    <linearGradient id="routeA" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0066cc"/>
      <stop offset="100%" stop-color="#4a90d9"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="1" dy="1" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="900" height="750" fill="url(#sky)" rx="8"/>
  <!-- Tile grid lines -->
  <g stroke="#c0d8e0" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="75" x2="900" y2="75"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="0" y1="225" x2="900" y2="225"/>
    <line x1="0" y1="300" x2="900" y2="300"/>
    <line x1="0" y1="375" x2="900" y2="375"/>
    <line x1="0" y1="450" x2="900" y2="450"/>
    <line x1="0" y1="525" x2="900" y2="525"/>
    <line x1="0" y1="600" x2="900" y2="600"/>
    <line x1="0" y1="675" x2="900" y2="675"/>
    <line x1="75" y1="0" x2="75" y2="750"/>
    <line x1="150" y1="0" x2="150" y2="750"/>
    <line x1="225" y1="0" x2="225" y2="750"/>
    <line x1="300" y1="0" x2="300" y2="750"/>
    <line x1="375" y1="0" x2="375" y2="750"/>
    <line x1="450" y1="0" x2="450" y2="750"/>
    <line x1="525" y1="0" x2="525" y2="750"/>
    <line x1="600" y1="0" x2="600" y2="750"/>
    <line x1="675" y1="0" x2="675" y2="750"/>
    <line x1="750" y1="0" x2="750" y2="750"/>
    <line x1="825" y1="0" x2="825" y2="750"/>
  </g>
  <!-- Compass -->
  <g transform="translate(830, 35)" fill="#555">
    <polygon points="0,-20 5,-5 0,-8 -5,-5" fill="#c0392b"/>
    <polygon points="0,20 5,5 0,8 -5,5" fill="#999"/>
    <rect x="-2" y="-22" width="4" height="44" fill="none"/>
    <text x="-4" y="-25" font-size="11" fill="#555" font-weight="bold">N</text>
  </g>
  <!-- Mountain terrain indicators -->
  <g fill="#c8dce0" opacity="0.35" stroke="#a0bcc0" stroke-width="0.5">
    <!-- 折多山 area -->
    <polygon points="150,440 180,380 210,440"/>
    <polygon points="170,460 200,400 230,460"/>
    <!-- Mountains near 雅拉山口 -->
    <polygon points="300,180 330,120 360,180"/>
    <polygon points="320,200 350,140 380,200"/>
    <polygon points="280,170 310,110 340,170"/>
    <!-- Mountains in NE -->
    <polygon points="500,100 530,50 560,100"/>
    <polygon points="520,120 550,70 580,120"/>
  </g>
  <!-- Route line: S434 from 康定 → 中谷村 → 迦嘎措 → 机场 → 雅拉山口 → 塔公 -->
  <!-- Geo coords → SVG: x = (lon-101.50)/0.5*900, y = (30.35-lat)/0.4*700 -->
  <polyline points="568,616 523,573 465,530 425,490 395,460 375,440 355,420 330,370 310,340 295,310 280,295 270,280 260,265 250,245 240,230 235,220 225,205 208,190 198,178 190,170 183,165 175,160 168,155 158,148 148,140 135,128 120,115 110,105 100,90"
    fill="none" stroke="#e74c3c" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>
  <!-- Route glow -->
  <polyline points="568,616 523,573 465,530 425,490 395,460 375,440 355,420 330,370 310,340 295,310 280,295 270,280 260,265 250,245 240,230 235,220 225,205 208,190 198,178 190,170 183,165 175,160 168,155 158,148 148,140 135,128 120,115 110,105 100,90"
    fill="none" stroke="#ff6b6b" stroke-width="8" stroke-linejoin="round" stroke-linecap="round" opacity="0.2"/>

  <!-- Waypoint markers -->
  <!-- 1. 康定 (start) 101.9569, 29.9985 -->
  <circle cx="568" cy="616" r="10" fill="#e74c3c" stroke="#fff" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="520" y="650" font-size="14" font-weight="bold" fill="#333">① 康定（出发）</text>
  <text x="520" y="668" font-size="11" fill="#888">海拔 2560m · 加满油出发</text>

  <!-- 2. 中谷村温泉 101.871, 30.264 -->
  <circle cx="415" cy="360" r="8" fill="#f39c12" stroke="#fff" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="320" y="348" font-size="13" font-weight="bold" fill="#333">② 中谷村·温泉</text>
  <text x="320" y="366" font-size="11" fill="#888">S434路边 可泡野温泉 30-50元</text>

  <!-- 3. 迦嘎措/红海子 101.7762, 30.1821 -->
  <circle cx="305" cy="296" r="8" fill="#2ecc71" stroke="#fff" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="190" y="282" font-size="13" font-weight="bold" fill="#333">③ 迦嘎措（红海子）</text>
  <text x="190" y="300" font-size="11" fill="#888">碧蓝湖泊+雅拉雪山倒影 15元/人</text>

  <!-- 4. 机场彩虹公路 斯丁措 101.7365, 30.1417 -->
  <circle cx="255" cy="238" r="8" fill="#9b59b6" stroke="#fff" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="90" y="200" font-size="13" font-weight="bold" fill="#333">④ 机场彩虹公路</text>
  <text x="90" y="218" font-size="11" fill="#888">三色标线+贡嘎雪山正面</text>

  <!-- 5. 雅拉山口 101.7469, 30.1834 -->
  <circle cx="215" cy="180" r="8" fill="#e67e22" stroke="#fff" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="60" y="120" font-size="13" font-weight="bold" fill="#333">⑤ 雅拉山口</text>
  <text x="60" y="138" font-size="11" fill="#888">S434最高点 4401m</text>

  <!-- 6. 塔公草原(折返点) 101.5550, 30.3299 -->
  <circle cx="100" cy="34" r="10" fill="#e74c3c" stroke="#fff" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="20" y="20" font-size="14" font-weight="bold" fill="#333">⑥ 塔公草原（折返）</text>
  <text x="20" y="38" font-size="11" fill="#888">折返回康定，原路返回</text>

  <!-- Title bar -->
  <rect x="0" y="702" width="900" height="48" fill="#2c3e50" rx="0"/>
  <text x="450" y="730" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff" font-family="sans-serif">D5 · S434北线雪山公路 — 康定 → 塔公（折返）</text>

  <!-- Legend -->
  <g transform="translate(580, 20)">
    <rect x="0" y="0" width="290" height="62" fill="white" fill-opacity="0.85" rx="4" stroke="#ddd" stroke-width="1"/>
    <text x="10" y="18" font-size="11" font-weight="bold" fill="#555">图例</text>
    <line x1="10" y1="32" x2="40" y2="32" stroke="#e74c3c" stroke-width="3"/>
    <text x="45" y="36" font-size="10" fill="#555">S434省道（行车路线）</text>
    <circle cx="18" cy="50" r="4" fill="#f39c12" stroke="#fff" stroke-width="1.5"/>
    <text x="45" y="54" font-size="10" fill="#555">途经点</text>
  </g>

  <!-- Route summary info -->
  <rect x="8" y="60" width="210" height="70" fill="white" fill-opacity="0.85" rx="4" stroke="#ddd" stroke-width="1"/>
  <text x="16" y="79" font-size="11" font-weight="bold" fill="#333">全程往返 ~130km / 4h</text>
  <text x="16" y="95" font-size="10" fill="#666">全柏油路 · 弯道缓 · 车少</text>
  <text x="16" y="111" font-size="10" fill="#c0392b">⚠️ 康定出发前加满油</text>
  <text x="16" y="124" font-size="10" fill="#666">中途无加油站</text>
</svg>