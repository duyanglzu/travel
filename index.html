<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
    <meta name="description" content="旅行攻略合集 - 川西、新疆、西藏等自驾路线规划">
    <title>旅行攻略合集 | Kevin's Travel</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🗺️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">
    <link id="themeCSS" rel="stylesheet" href="themes/default.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "HarmonyOS Sans", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            background: var(--bg-body);
            color: var(--text);
            line-height: 1.75;
            font-size: 15px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 16px;
        }

        @media (min-width: 769px) {
            .container { max-width: 960px; padding: 32px; }
        }

        /* Hero Header */
        .header {
            position: relative;
            overflow: hidden;
            color: white;
            padding: 48px 24px 40px;
            border-radius: 20px;
            margin-bottom: 24px;
            text-align: center;
            min-height: 260px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: var(--shadow-lg);
        }

        .header::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(6,182,212,0.8), rgba(59,130,246,0.9));
            z-index: 0;
        }

        .header h1 {
            position: relative;
            z-index: 1;
            font-family: "Noto Serif SC", serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            text-shadow: 0 2px 16px rgba(0,0,0,0.4);
        }

        .header p {
            position: relative;
            z-index: 1;
            font-size: 14px;
            opacity: 0.95;
            text-shadow: 0 1px 8px rgba(0,0,0,0.3);
        }

        /* Destination Cards */
        .dest-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
            border: 1px solid rgba(255,255,255,0.6);
            transition: all 0.2s ease;
        }

        .dest-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        @media (min-width: 769px) {
            .dest-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
                gap: 20px;
            }
        }

        .dest-card h2 {
            font-size: 20px;
            color: var(--primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dest-card h3 {
            font-size: 16px;
            margin: 12px 0 8px;
            color: var(--text-secondary);
        }

        .dest-card p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .route-list {
            list-style: none;
            padding: 0;
            margin: 12px 0;
        }

        .route-list li {
            padding: 12px 16px;
            margin: 8px 0;
            background: var(--primary-bg);
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid var(--primary-border);
        }

        .route-list li:hover {
            background: var(--primary-border);
            transform: translateX(4px);
        }

        .route-list li a {
            flex: 1;
            text-decoration: none;
            color: var(--text);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .route-name {
            font-weight: 600;
            font-size: 15px;
        }

        .route-meta {
            font-size: 12px;
            color: var(--text-light);
        }

        .route-badge {
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            white-space: nowrap;
        }

        .route-badge.hot {
            background: #EF4444;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px 16px;
            font-size: 12px;
            color: var(--text-light);
            border-top: 1px solid var(--border);
            margin-top: 40px;
        }

        /* Theme buttons */
        .theme-bar {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .theme-btn {
            background: var(--primary-bg);
            border: 1.5px solid var(--primary-border);
            border-radius: 8px;
            color: var(--primary);
            padding: 3px 8px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s ease;
        }

        .theme-btn:hover { background: var(--primary-border); }
        .theme-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .dark-toggle-btn {
            background: var(--bg-highlight);
            border: 1.5px solid var(--border);
            border-radius: 8px;
            color: var(--text-secondary);
            padding: 3px 8px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s ease;
        }

        .dark-toggle-btn:hover { border-color: var(--primary); color: var(--primary); }
    </style>
</head>
<body>
    <div class="container" id="content">
        <div class="header">
            <h1>🗺️ 旅行攻略合集</h1>
            <p>我的自驾路线规划 · 持续更新中</p>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin:-4px 0 16px;">
            <div style="font-size:11px;color:#9CA3AF;">Kevin's Travel Plans</div>
            <div class="theme-bar" id="themeBar">
                <button class="theme-btn active" data-theme="default">默认蓝调</button>
                <button class="theme-btn" data-theme="magazine">杂志风</button>
                <button class="theme-btn" data-theme="minimal">极简风</button>
                <button class="theme-btn" data-theme="journal">手账风</button>
                <button class="theme-btn" data-theme="plateau">高原风</button>
                <button class="dark-toggle-btn" id="darkToggle">🌙 深色</button>
            </div>
        </div>

        <!-- 四川方向 -->
        <div class="dest-card">
            <h2>🏔️ 四川线路</h2>
            <p>川西高原自驾攻略，适合家庭亲子出行</p>
            
            <div class="dest-grid">
                <!-- 川西卡片 -->
                <div class="dest-card" style="margin:0;">
                    <h3>川西17天自驾</h3>
                    <p><strong>V8.0 版本</strong> · 两车两家 · 甘孜州东线深度游</p>
                    <ul class="route-list">
                        <li>
                            <a href="west-sichuan.html">
                                <span class="route-name">方案一 · 完整环线</span>
                                <span class="route-meta">17天 · 成都-康定-甲根坝-道孚-金川-四姑娘山-重庆</span>
                            </a>
                            <span class="route-badge hot">主力</span>
                        </li>
                        <li>
                            <a href="paired-trip.html">
                                <span class="route-name">方案二 · 双方并行</span>
                                <span class="route-meta">D1-D8 同行 · D9 分开 · 适合临时加入</span>
                            </a>
                            <span class="route-badge">并行</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- 后续扩展区域 -->
        <div class="dest-card" style="opacity: 0.6;">
            <h2>📍 更多目的地</h2>
            <p>新疆 · 西藏 · 云南 · 西北...</p>
            <p style="font-size: 13px;">* 正在规划中</p>
        </div>

        <div class="footer">
            <span id="versionTop">v8.0</span><br>
            © 2026 Kevin's Travel
        </div>
    </div>

    <script>
        function setupThemeSystem() {
            const themeLink = document.getElementById('themeCSS');
            const darkBtn = document.getElementById('darkToggle');
            const themeBar = document.getElementById('themeBar');
            const html = document.documentElement;
            const themeBtns = themeBar.querySelectorAll('.theme-btn');

            const savedTheme = localStorage.getItem('colorTheme') || 'default';
            const savedDark = localStorage.getItem('theme');

            function applyTheme(name) {
                themeLink.href = 'themes/' + name + '.css';
                themeBtns.forEach(function(b) { b.classList.toggle('active', b.dataset.theme === name); });
                localStorage.setItem('colorTheme', name);
            }

            function applyDark(isDark) {
                html.classList.toggle('dark', isDark);
                darkBtn.textContent = isDark ? '☀️ 浅色' : '🌙 深色';
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
            }

            applyTheme(savedTheme);
            if (savedDark === 'dark' || (!savedDark && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                applyDark(true);
            }

            themeBtns.forEach(function(btn) {
                btn.addEventListener('click', function() { applyTheme(btn.dataset.theme); });
            });

            darkBtn.addEventListener('click', function() {
                applyDark(!html.classList.contains('dark'));
            });
        }

        document.addEventListener('DOMContentLoaded', setupThemeSystem);
    </script>
</body>
</html>
